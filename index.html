<!DOCTYPE html>
<html>
<head>
    <title>Block Blast Lite</title>
    <style>
        body { background: #2c3e50; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        #grid { display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); gap: 2px; margin-top: 20px; }
        .cell { width: 40px; height: 40px; background: #34495e; border-radius: 4px; }
        .cell.filled { background: #3498db; }
        #pieces { display: flex; gap: 20px; margin-top: 20px; }
        .piece { width: 80px; height: 40px; background: #e74c3c; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Block Blast</h1>
    <div id="grid"></div>
    <div id="pieces">
        <div class="piece" draggable="true" ondragstart="drag(event)"></div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        let board = Array(8).fill().map(() => Array(8).fill(0));

        // Şəbəkəni yarat
        for (let i = 0; i < 64; i++) {
            let div = document.createElement('div');
            div.className = 'cell';
            div.dataset.index = i;
            div.addEventListener('drop', drop);
            div.addEventListener('dragover', (e) => e.preventDefault());
            grid.appendChild(div);
        }

        function drag(e) { e.dataTransfer.setData("text", e.target.id); }

        function drop(e) {
            e.preventDefault();
            let index = parseInt(e.target.dataset.index);
            let row = Math.floor(index / 8);
            let col = index % 8;

            if (board[row][col] === 0) {
                board[row][col] = 1;
                e.target.classList.add('filled');
                checkLines();
            }
        }

        function checkLines() {
            // Sətirləri yoxla
            for (let r = 0; r < 8; r++) {
                if (board[r].every(c => c === 1)) {
                    board[r] = Array(8).fill(0);
                    updateGrid();
                }
            }
        }

        function updateGrid() {
            let cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                let r = Math.floor(i / 8);
                let c = i % 8;
                cell.className = board[r][c] === 1 ? 'cell filled' : 'cell';
            });
        }
    </script>
</body>
</html>
